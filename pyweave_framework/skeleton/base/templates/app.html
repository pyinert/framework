<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.props.title or page.props.app_name or 'PyWeave' }}</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="{{ page.props.app_name or 'PyWeave' }}" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="icon" href="/static/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <script type="module" src="{{ url_for('static', filename='pyweave-spa.js') }}"></script>
  {% if page.component %}
  <script type="module" src="http://localhost:5173/frontend/app.js"></script>
  {% endif %}
</head>
<body>
  <div id="pyweave-app" data-page='{{ page | tojson }}'>{{ slot | safe }}</div>
</body>
</html>
